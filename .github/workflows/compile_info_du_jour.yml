name: Compile info du jour PDFs

on:
  push:
    paths:
      - 'info_du_jour/**/*.tex'
      - '.github/workflows/compile_info_du_jour.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX files
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            info_du_jour/2026-05-01/info_du_jour_2026-05-01.tex
          work_in_root_file_dir: true
          latexmk_use_xelatex: false
          extra_system_packages: "py3-pygments"

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add info_du_jour/**/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "Compilation PDF info du jour"
            git push
          fi
